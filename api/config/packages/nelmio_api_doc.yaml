nelmio_api_doc:
    documentation:
        openapi: 3.0.3
        info:
            title: AI conversion API
            description: Authenticate customers, submit file conversion jobs, poll job status, and download completed results.
            version: 1.0.0
        tags:
            - name: Authentication
              description: JWT token issuance for customers.
            - name: Conversions
              description: Submit, inspect, and download file conversions.
        components:
            securitySchemes:
                bearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
            schemas:
                AuthTokenRequest:
                    type: object
                    required: [username, password]
                    properties:
                        username:
                            type: string
                            description: Customer username.
                        password:
                            type: string
                            description: Customer password.
                AuthTokenResponse:
                    type: object
                    required: [token]
                    properties:
                        token:
                            type: string
                            description: JWT bearer token.
                AuthInvalidCredentialsResponse:
                    type: object
                    required: [code, message]
                    properties:
                        code:
                            type: integer
                            example: 401
                        message:
                            type: string
                            example: Invalid credentials.
                AuthMissingCredentialsResponse:
                    type: object
                    required: [status, detail]
                    properties:
                        status:
                            type: integer
                            example: 400
                        detail:
                            type: string
                            example: The key "password" must be provided.
                AcceptedConversionResponse:
                    type: object
                    required: [id, status]
                    properties:
                        id:
                            type: string
                            format: uuid
                        status:
                            type: string
                            enum: [accepted]
                ConversionStatusResponse:
                    type: object
                    required: [id, status, message, lastUpdate]
                    properties:
                        id:
                            type: string
                            format: uuid
                        status:
                            type: string
                            enum: [accepted, inprogress, failed, completed]
                        message:
                            type: string
                        lastUpdate:
                            type: string
                            format: date-time
                            nullable: true
                MessageResponse:
                    type: object
                    required: [message]
                    properties:
                        message:
                            type: string
        paths:
            /auth/token:
                post:
                    tags: [Authentication]
                    summary: Issue a JWT token
                    requestBody:
                        required: true
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/AuthTokenRequest'
                    responses:
                        '200':
                            description: JWT issued successfully.
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/AuthTokenResponse'
                        '400':
                            description: Request body is missing username or password.
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/AuthMissingCredentialsResponse'
                        '401':
                            description: Invalid credentials.
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/AuthInvalidCredentialsResponse'
            /conversions:
                post:
                    tags: [Conversions]
                    summary: Submit a conversion job
                    security:
                        - bearerAuth: [ ]
                    requestBody:
                        required: true
                        content:
                            multipart/form-data:
                                schema:
                                    type: object
                                    required: [file, targetFormat]
                                    properties:
                                        file:
                                            type: string
                                            format: binary
                                            description: Source file in csv, json, xlsx, or ods format.
                                        targetFormat:
                                            type: string
                                            enum: [json, xml]
                    responses:
                        '202':
                            description: Conversion accepted.
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/AcceptedConversionResponse'
                                application/xml:
                                    schema:
                                        $ref: '#/components/schemas/AcceptedConversionResponse'
                        '400':
                            description: Uploaded file or target format is invalid.
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/MessageResponse'
                                application/xml:
                                    schema:
                                        $ref: '#/components/schemas/MessageResponse'
                        '401':
                            description: Missing or invalid JWT.
            /conversions/{id}:
                get:
                    tags: [Conversions]
                    summary: Check conversion status
                    security:
                        - bearerAuth: [ ]
                    parameters:
                        - name: id
                          in: path
                          required: true
                          schema:
                              type: string
                              format: uuid
                    responses:
                        '200':
                            description: Conversion status details.
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/ConversionStatusResponse'
                                application/xml:
                                    schema:
                                        $ref: '#/components/schemas/ConversionStatusResponse'
                        '401':
                            description: Missing or invalid JWT.
                        '404':
                            description: Conversion not found for the authenticated customer.
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/MessageResponse'
                                application/xml:
                                    schema:
                                        $ref: '#/components/schemas/MessageResponse'
            /conversions/{id}/download:
                get:
                    tags: [Conversions]
                    summary: Download a completed conversion
                    security:
                        - bearerAuth: [ ]
                    parameters:
                        - name: id
                          in: path
                          required: true
                          schema:
                              type: string
                              format: uuid
                    responses:
                        '200':
                            description: Converted file content.
                            headers:
                                Content-Disposition:
                                    schema:
                                        type: string
                                    description: Attachment filename in the form {conversionId}.{targetFormat}.
                            content:
                                application/json:
                                    schema:
                                        type: string
                                application/xml:
                                    schema:
                                        type: string
                        '401':
                            description: Missing or invalid JWT.
                        '404':
                            description: Conversion was not found, is not completed yet, or its stored output is missing.
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/MessageResponse'
                                application/xml:
                                    schema:
                                        $ref: '#/components/schemas/MessageResponse'
    areas: # to filter documented areas
        path_patterns:
            - ^/(?!doc(?:\.json)?$) # Accepts application routes except the documentation endpoints
