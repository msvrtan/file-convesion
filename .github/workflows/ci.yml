name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    ci:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: api

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                php-version: '8.5'
                coverage: none
                extensions: ctype, iconv, pdo_sqlite, sqlite3
                tools: composer:v2

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                path: api/vendor
                key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('api/composer.lock') }}
                restore-keys: |
                    ${{ runner.os }}-php-8.5-composer-

            - name: Install Composer dependencies
              run: composer install --no-interaction --no-progress --prefer-dist

            - name: Run lint
              run: make lint

            - name: Run analyse
              run: make analyse

            - name: Generate JWT keypair
              run: make jwt-keypair

            - name: Run tests
              run: make test
